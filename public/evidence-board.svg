<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="Forensic evidence board">
  <defs>
    <radialGradient id="lamp" cx="32%" cy="3%" r="80%">
      <stop offset="0" stop-color="#3d2d16" stop-opacity=".52"/>
      <stop offset=".4" stop-color="#15161a" stop-opacity=".22"/>
      <stop offset="1" stop-color="#0e0f11" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="44%" r="74%">
      <stop offset="54%" stop-color="#0e0f11" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity=".5"/>
    </radialGradient>
    <radialGradient id="photo" cx="50%" cy="32%" r="82%">
      <stop offset="0" stop-color="#31333c"/><stop offset="1" stop-color="#0c0d10"/>
    </radialGradient>
    <radialGradient id="pin" cx="34%" cy="28%" r="72%">
      <stop offset="0" stop-color="#ffd789"/><stop offset=".45" stop-color="#e0a33a"/><stop offset="1" stop-color="#80551a"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .2"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#0e0f11"/>
  <rect width="1440" height="900" fill="url(#lamp)"/>

  <g stroke="#e0a33a" stroke-opacity=".32" stroke-width="1.4" fill="none">
    <path d="M44 54 h26 M54 44 v26"/>
    <path d="M1396 846 h-26 M1386 856 v-26"/>
  </g>

  <g fill="none" stroke="#c9923f" stroke-opacity=".4" stroke-width="1.4">
    <path d="M270 250 Q 470 366 640 230"/>
    <path d="M640 230 Q 880 332 1130 300"/>
    <path d="M270 250 Q 352 474 560 600"/>
    <path d="M640 230 Q 770 470 980 590"/>
    <path d="M1130 300 Q 1086 472 980 590"/>
  </g>

  <g filter="url(#soft)" transform="translate(150 250) rotate(-5)">
    <rect width="244" height="172" rx="6" fill="#1b1c22" stroke="#e0a33a" stroke-opacity=".2"/>
    <rect x="16" y="18" width="212" height="112" rx="3" fill="url(#photo)"/>
    <circle cx="150" cy="58" r="5" fill="#ffffff" fill-opacity=".3"/>
    <rect x="16" y="-6" width="40" height="14" rx="4" fill="#e0a33a" fill-opacity=".5" transform="rotate(-8 36 1)"/>
    <text x="18" y="152" font-family="monospace" font-size="13" fill="#e0a33a" fill-opacity=".58">EXHIBIT 26-A</text>
  </g>

  <g filter="url(#soft)" transform="translate(540 230) rotate(4)">
    <rect width="250" height="196" rx="6" fill="#1e1f27" stroke="#e0a33a" stroke-opacity=".22"/>
    <g fill="#e0a33a" fill-opacity=".17">
      <rect x="24" y="34" width="150" height="7" rx="3"/><rect x="24" y="54" width="196" height="7" rx="3"/>
      <rect x="24" y="74" width="120" height="7" rx="3"/><rect x="24" y="94" width="180" height="7" rx="3"/>
      <rect x="24" y="114" width="96" height="7" rx="3"/><rect x="24" y="134" width="164" height="7" rx="3"/>
    </g>
    <rect x="120" y="31" width="86" height="13" fill="#0a0b0d"/><rect x="96" y="111" width="100" height="13" fill="#0a0b0d"/>
    <text x="24" y="176" font-family="monospace" font-size="12" fill="#e5544b" fill-opacity=".6">CONFIDENTIAL</text>
  </g>

  <g filter="url(#soft)" transform="translate(1040 300) rotate(7)">
    <rect width="230" height="184" rx="6" fill="#191a20" stroke="#e0a33a" stroke-opacity=".2"/>
    <g stroke="#e0a33a" stroke-opacity=".48" fill="none" stroke-width="2.2">
      <ellipse cx="115" cy="86" rx="44" ry="54"/><ellipse cx="115" cy="86" rx="32" ry="40"/>
      <ellipse cx="115" cy="86" rx="20" ry="26"/><ellipse cx="115" cy="86" rx="9" ry="12"/>
    </g>
    <text x="22" y="166" font-family="monospace" font-size="12" fill="#e0a33a" fill-opacity=".55">LATENT PRINT</text>
  </g>

  <g filter="url(#soft)" transform="translate(440 600) rotate(-3)">
    <rect width="260" height="206" rx="7" fill="#1d1e25" stroke="#e0a33a" stroke-opacity=".5" stroke-width="1.6"/>
    <rect x="18" y="18" width="224" height="128" rx="3" fill="url(#photo)"/>
    <circle cx="130" cy="74" r="30" fill="#0c0d10"/>
    <path d="M96 136 q34 -44 68 0 z" fill="#0c0d10"/>
    <text x="18" y="180" font-family="monospace" font-size="13" fill="#e0a33a" fill-opacity=".62">PERSON OF INTEREST</text>
  </g>

  <g filter="url(#soft)" transform="translate(880 590) rotate(6)">
    <rect width="240" height="176" rx="6" fill="#171a1e" stroke="#e0a33a" stroke-opacity=".2"/>
    <g stroke="#e0a33a" stroke-opacity=".12" stroke-width="1.4" fill="none"><path d="M0 58 H240 M0 116 H240 M72 0 V176 M156 0 V176"/></g>
    <path d="M40 140 q60 -70 130 -34" fill="none" stroke="#e0a33a" stroke-opacity=".4" stroke-width="2.4" stroke-dasharray="6 6"/>
    <path d="M170 60 c-12 0 -21 9 -21 21 c0 16 21 32 21 32 c0 0 21 -16 21 -32 c0 -12 -9 -21 -21 -21 z" fill="#e0a33a" fill-opacity=".55"/>
    <circle cx="170" cy="81" r="6" fill="#171a1e"/>
    <circle cx="40" cy="140" r="5" fill="#e5544b" fill-opacity=".5"/>
  </g>

  <g>
    <g><ellipse cx="270" cy="254" rx="9" ry="4" fill="#000" fill-opacity=".5"/><circle cx="270" cy="250" r="8" fill="url(#pin)"/><circle cx="267" cy="247" r="2.4" fill="#fff" fill-opacity=".72"/></g>
    <g><ellipse cx="640" cy="234" rx="9" ry="4" fill="#000" fill-opacity=".5"/><circle cx="640" cy="230" r="8" fill="url(#pin)"/><circle cx="637" cy="227" r="2.4" fill="#fff" fill-opacity=".72"/></g>
    <g><ellipse cx="1130" cy="304" rx="9" ry="4" fill="#000" fill-opacity=".5"/><circle cx="1130" cy="300" r="8" fill="url(#pin)"/><circle cx="1127" cy="297" r="2.4" fill="#fff" fill-opacity=".72"/></g>
    <g><ellipse cx="560" cy="604" rx="9" ry="4" fill="#000" fill-opacity=".5"/><circle cx="560" cy="600" r="8" fill="url(#pin)"/><circle cx="557" cy="597" r="2.4" fill="#fff" fill-opacity=".72"/></g>
    <g><ellipse cx="980" cy="594" rx="9" ry="4" fill="#000" fill-opacity=".5"/><circle cx="980" cy="590" r="8" fill="url(#pin)"/><circle cx="977" cy="587" r="2.4" fill="#fff" fill-opacity=".72"/></g>
  </g>

  <g transform="translate(1230 700) rotate(7)">
    <line x1="40" y1="0" x2="40" y2="26" stroke="#c9923f" stroke-opacity=".5" stroke-width="1.4"/>
    <rect x="0" y="26" width="98" height="40" rx="5" fill="#1a1b21" stroke="#e0a33a" stroke-opacity=".4"/>
    <circle cx="14" cy="46" r="5" fill="none" stroke="#e0a33a" stroke-opacity=".5"/>
    <text x="32" y="51" font-family="monospace" font-size="13" fill="#e0a33a" fill-opacity=".6">EVID</text>
  </g>

  <rect width="1440" height="900" fill="url(#vig)"/>
  <rect width="1440" height="900" filter="url(#grain)" opacity=".22"/>
</svg>
